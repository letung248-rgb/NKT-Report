<!DOCTYPE html>
<html lang="vi">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --line: #d8dee9;
      --text: #172033;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --shadow: 0 1px 2px rgb(15 23 42 / 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    button, input, select { font: inherit; }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .topbar-inner {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .stamp {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .toolbar {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px)) auto 1fr;
      gap: 10px;
      align-items: end;
      box-shadow: var(--shadow);
    }

    .field { display: grid; gap: 5px; }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input, select {
      height: 38px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 7px 9px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgb(37 99 235 / 0.12);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .button-primary { background: var(--primary); color: #fff; }
    .button-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .button-secondary { background: #fff; color: #334155; border-color: var(--line); }
    .button-secondary:hover:not(:disabled) { background: #f8fafc; }
    .button:disabled { opacity: 0.6; cursor: not-allowed; }

    details {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    summary {
      color: #334155;
      cursor: pointer;
      font-weight: 700;
      width: fit-content;
    }

    .optional-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 220px));
      gap: 10px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      min-height: 76px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 5px;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
    }

    .metric.tp .metric-value { color: var(--green); }
    .metric.cs .metric-value { color: var(--amber); }
    .metric.hong .metric-value { color: var(--red); }

    .table-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .table-head {
      min-height: 44px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .table-title { font-weight: 800; }
    .table-count { color: var(--muted); font-size: 12px; }

    .table-wrap { overflow: auto; max-height: calc(100vh - 265px); }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #e8edf5;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      z-index: 1;
    }

    tbody tr:hover { background: #f8fbff; }

    .notes {
      white-space: normal;
      min-width: 220px;
      max-width: 340px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      background: #eef2f7;
      color: #475569;
    }

    .badge.tp { background: #dcfce7; color: #166534; }
    .badge.cs { background: #fef3c7; color: #92400e; }
    .badge.hong { background: #fee2e2; color: #991b1b; }
    .badge.dxl { background: #dbeafe; color: #1e40af; }

    .state-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; gap: 6px; }
      .stamp { white-space: normal; }
      main { padding: 12px; }
      .toolbar { grid-template-columns: 1fr; }
      .optional-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <h1>Báo cáo ngày</h1>
        <div class="stamp" id="generatedAt"></div>
      </div>
    </header>

    <main>
      <form class="toolbar" id="filterForm">
        <div class="field">
          <label for="dateFilter">Ngày</label>
          <input id="dateFilter" name="date" type="date" required>
        </div>
        <div class="field">
          <label for="shiftFilter">Ca</label>
          <select id="shiftFilter" name="shift">
            <option value="">Tất cả</option>
          </select>
        </div>
        <div class="actions">
          <button class="button button-primary" type="submit" id="loadButton">Tải</button>
          <button class="button button-secondary" type="button" id="resetButton">Xóa lọc</button>
        </div>
        <div class="state-line" id="stateLine"></div>
        <details>
          <summary>Bộ lọc khác</summary>
          <div class="optional-grid">
            <div class="field">
              <label for="processFilter">Nguyên công</label>
              <select id="processFilter" name="process">
                <option value="">Tất cả</option>
              </select>
            </div>
            <div class="field">
              <label for="statusFilter">Tình trạng</label>
              <select id="statusFilter" name="status">
                <option value="">Tất cả</option>
              </select>
            </div>
          </div>
        </details>
      </form>

      <section class="summary-grid" aria-label="Tổng hợp ngày">
        <div class="metric">
          <div class="metric-label">Tổng ống</div>
          <div class="metric-value" id="totalPipes">0</div>
        </div>
        <div class="metric tp">
          <div class="metric-label">Thành phẩm</div>
          <div class="metric-value" id="thanhPham">0</div>
        </div>
        <div class="metric cs">
          <div class="metric-label">Chờ sửa</div>
          <div class="metric-value" id="choSua">0</div>
        </div>
        <div class="metric hong">
          <div class="metric-label">Hỏng</div>
          <div class="metric-value" id="hong">0</div>
        </div>
      </section>

      <section class="table-panel">
        <div class="table-head">
          <div class="table-title">Chi tiết ống</div>
          <div class="table-count" id="rowCount">0 dòng</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ngày</th>
                <th>Ca</th>
                <th>Nguyên công</th>
                <th>Số ống</th>
                <th>Tình trạng</th>
                <th>Nhóm</th>
                <th>Nguyên nhân</th>
                <th>Loại ống</th>
                <th>Mã bó</th>
                <th>Khoang</th>
                <th>Từ giếng</th>
                <th>Từ giàn</th>
                <th>Người TH 1</th>
                <th>Người TH 2</th>
                <th>Giờ nhận</th>
                <th>Ghi chú</th>
              </tr>
            </thead>
            <tbody id="rowsBody"></tbody>
          </table>
          <div class="empty" id="emptyState" hidden>Không có dữ liệu cho bộ lọc hiện tại.</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      options: { shifts: [], processes: [], statuses: [] },
      lastFilters: {}
    };

    const els = {
      form: document.getElementById('filterForm'),
      date: document.getElementById('dateFilter'),
      shift: document.getElementById('shiftFilter'),
      process: document.getElementById('processFilter'),
      status: document.getElementById('statusFilter'),
      loadButton: document.getElementById('loadButton'),
      resetButton: document.getElementById('resetButton'),
      stateLine: document.getElementById('stateLine'),
      generatedAt: document.getElementById('generatedAt'),
      totalPipes: document.getElementById('totalPipes'),
      thanhPham: document.getElementById('thanhPham'),
      choSua: document.getElementById('choSua'),
      hong: document.getElementById('hong'),
      rowCount: document.getElementById('rowCount'),
      rowsBody: document.getElementById('rowsBody'),
      emptyState: document.getElementById('emptyState')
    };

    function todayKey() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return now.getFullYear() + '-' + month + '-' + day;
    }

    function currentFilters() {
      return {
        date: els.date.value,
        shift: els.shift.value,
        process: els.process.value,
        status: els.status.value
      };
    }

    function setLoading(isLoading) {
      els.loadButton.disabled = isLoading;
      els.resetButton.disabled = isLoading;
      els.stateLine.textContent = isLoading ? 'Đang tải...' : '';
    }

    function loadReport() {
      const filters = currentFilters();
      state.lastFilters = filters;
      setLoading(true);

      if (window.google && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            setLoading(false);
            renderReport(response || {});
          })
          .withFailureHandler(function(error) {
            setLoading(false);
            renderError(error && error.message ? error.message : String(error || 'Không tải được dữ liệu.'));
          })
          .getDailyReportData(filters);
      } else {
        setLoading(false);
        renderError('Không có kết nối Apps Script.');
      }
    }

    function renderReport(response) {
      if (!response.success) {
        renderError(response.message || 'Không tải được dữ liệu.');
        return;
      }

      state.options = response.options || state.options;
      fillSelect(els.shift, state.options.shifts || [], state.lastFilters.shift);
      fillSelect(els.process, state.options.processes || [], state.lastFilters.process);
      fillSelect(els.status, state.options.statuses || [], state.lastFilters.status);

      const summary = response.summary || {};
      els.generatedAt.textContent = response.generatedAt ? 'Cập nhật: ' + response.generatedAt : '';
      els.totalPipes.textContent = numberText(summary.totalPipes);
      els.thanhPham.textContent = numberText(summary.thanhPham);
      els.choSua.textContent = numberText(summary.choSua);
      els.hong.textContent = numberText(summary.hong);

      const rows = response.rows || [];
      els.rowCount.textContent = numberText(rows.length) + ' dòng';
      els.rowsBody.textContent = '';
      rows.forEach(function(row) {
        els.rowsBody.appendChild(buildRow(row));
      });
      els.emptyState.hidden = rows.length > 0;
    }

    function renderError(message) {
      els.stateLine.textContent = message;
      els.totalPipes.textContent = '0';
      els.thanhPham.textContent = '0';
      els.choSua.textContent = '0';
      els.hong.textContent = '0';
      els.rowCount.textContent = '0 dòng';
      els.rowsBody.textContent = '';
      els.emptyState.hidden = false;
    }

    function fillSelect(select, values, selectedValue) {
      const firstLabel = select.id === 'shiftFilter' ? 'Tất cả' : 'Tất cả';
      select.textContent = '';
      select.appendChild(new Option(firstLabel, ''));
      values.forEach(function(value) {
        select.appendChild(new Option(value, value));
      });
      select.value = selectedValue || '';
    }

    function buildRow(row) {
      const tr = document.createElement('tr');
      addCell(tr, row.date);
      addCell(tr, row.shift);
      addCell(tr, row.process);
      addCell(tr, row.pipeNo);
      addCell(tr, row.status);
      addBadgeCell(tr, row.statusLabel, row.statusKey);
      addCell(tr, row.defectReason);
      addCell(tr, row.size);
      addCell(tr, row.bundleCode);
      addCell(tr, row.compartment);
      addCell(tr, row.well);
      addCell(tr, row.rig);
      addCell(tr, row.worker1);
      addCell(tr, row.worker2);
      addCell(tr, row.receiveTime);
      addCell(tr, row.notes, 'notes');
      return tr;
    }

    function addCell(tr, value, className) {
      const td = document.createElement('td');
      if (className) td.className = className;
      td.textContent = value || '';
      tr.appendChild(td);
    }

    function addBadgeCell(tr, label, statusKey) {
      const td = document.createElement('td');
      const span = document.createElement('span');
      span.className = 'badge ' + (statusKey || '');
      span.textContent = label || '';
      td.appendChild(span);
      tr.appendChild(td);
    }

    function numberText(value) {
      return Number(value || 0).toLocaleString('vi-VN');
    }

    els.form.addEventListener('submit', function(event) {
      event.preventDefault();
      loadReport();
    });

    els.resetButton.addEventListener('click', function() {
      els.shift.value = '';
      els.process.value = '';
      els.status.value = '';
      loadReport();
    });

    document.addEventListener('DOMContentLoaded', function() {
      els.date.value = todayKey();
      loadReport();
    });
  </script>
</body>
</html>
