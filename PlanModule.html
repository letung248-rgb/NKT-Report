<!DOCTYPE html>
<html lang="vi">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kế hoạch sản xuất</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --text: #17202a;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --field: #ffffff;
      --primary: #155eef;
      --primary-dark: #0f49bd;
      --danger: #b42318;
      --ok: #067647;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 24px;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
    }

    section {
      padding: 22px 0 28px;
      border-top: 1px solid var(--line);
    }

    section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .dong-nhap {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    label {
      color: var(--text);
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--field);
      color: var(--text);
      font: inherit;
      padding: 8px 10px;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(21, 94, 239, 0.18);
      border-color: var(--primary);
    }

    button {
      justify-self: start;
      min-width: 96px;
      min-height: 40px;
      border: 0;
      border-radius: 4px;
      background: var(--primary);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      padding: 9px 18px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: var(--primary-dark);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .trang-thai {
      min-height: 22px;
      margin: 8px 0 0 172px;
      color: var(--muted);
    }

    .trang-thai.loi {
      color: var(--danger);
    }

    .trang-thai.ok {
      color: var(--ok);
    }

    @media (max-width: 560px) {
      main {
        width: min(100vw - 24px, 760px);
        padding-top: 20px;
      }

      .dong-nhap {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .trang-thai {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Kế hoạch sản xuất</h1>

    <section aria-labelledby="tieu-de-ngay">
      <h2 id="tieu-de-ngay">Kế hoạch ngày</h2>
      <form id="form-ngay" data-loai="ngay" novalidate>
        <div class="dong-nhap">
          <label for="ngay">Ngày</label>
          <input id="ngay" name="ngay" type="date" required>
        </div>
        <div class="dong-nhap">
          <label for="size-ngay">Size</label>
          <select id="size-ngay" name="size" required></select>
        </div>
        <div class="dong-nhap">
          <label for="kiem-tra-ngay">KH Kiểm tra</label>
          <input id="kiem-tra-ngay" name="kiemTra" type="number" min="0" step="1" required>
        </div>
        <div class="dong-nhap">
          <label for="thanh-pham-ngay">KH Thành phẩm</label>
          <input id="thanh-pham-ngay" name="thanhPham" type="number" min="0" step="1" required>
        </div>
        <button type="submit">LƯU</button>
        <div class="trang-thai" id="trang-thai-ngay" role="status" aria-live="polite"></div>
      </form>
    </section>

    <section aria-labelledby="tieu-de-thang">
      <h2 id="tieu-de-thang">Kế hoạch tháng</h2>
      <form id="form-thang" data-loai="thang" novalidate>
        <div class="dong-nhap">
          <label for="thang">Tháng</label>
          <input id="thang" name="thang" type="month" required>
        </div>
        <div class="dong-nhap">
          <label for="size-thang">Size</label>
          <select id="size-thang" name="size" required></select>
        </div>
        <div class="dong-nhap">
          <label for="kiem-tra-thang">KH Kiểm tra</label>
          <input id="kiem-tra-thang" name="kiemTra" type="number" min="0" step="1" required>
        </div>
        <div class="dong-nhap">
          <label for="thanh-pham-thang">KH Thành phẩm</label>
          <input id="thanh-pham-thang" name="thanhPham" type="number" min="0" step="1" required>
        </div>
        <button type="submit">LƯU</button>
        <div class="trang-thai" id="trang-thai-thang" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    (function() {
      'use strict';

      var trangThai = {
        sizes: [],
        daily: [],
        monthly: [],
        dangLuu: false
      };

      var cauHinh = {
        ngay: {
          formId: 'form-ngay',
          periodName: 'ngay',
          sizeId: 'size-ngay',
          statusId: 'trang-thai-ngay',
          collection: 'daily'
        },
        thang: {
          formId: 'form-thang',
          periodName: 'thang',
          sizeId: 'size-thang',
          statusId: 'trang-thai-thang',
          collection: 'monthly'
        }
      };

      function layPhanTu(id) {
        return document.getElementById(id);
      }

      function khoiDong() {
        Object.keys(cauHinh).forEach(function(loai) {
          layPhanTu(cauHinh[loai].formId).addEventListener('submit', function(suKien) {
            suKien.preventDefault();
            luuKeHoach(loai);
          });
        });
        taiDuLieu();
      }

      function taiDuLieu() {
        datThongBao('ngay', 'Đang tải dữ liệu...', '');
        datThongBao('thang', 'Đang tải dữ liệu...', '');

        goiServer('getPlanModuleData', null)
          .then(function(phanHoi) {
            if (!phanHoi || phanHoi.success !== true || !phanHoi.data) {
              throw new Error('Phản hồi dữ liệu kế hoạch không hợp lệ.');
            }
            trangThai.sizes = Array.isArray(phanHoi.data.sizes) ? phanHoi.data.sizes : [];
            trangThai.daily = Array.isArray(phanHoi.data.daily) ? phanHoi.data.daily : [];
            trangThai.monthly = Array.isArray(phanHoi.data.monthly) ? phanHoi.data.monthly : [];
            napSize();
            datThongBao('ngay', '', '');
            datThongBao('thang', '', '');
          })
          .catch(function(loi) {
            var thongDiep = layThongDiepLoi(loi, 'Không tải được dữ liệu kế hoạch.');
            datThongBao('ngay', thongDiep, 'loi');
            datThongBao('thang', thongDiep, 'loi');
          });
      }

      function napSize() {
        ['ngay', 'thang'].forEach(function(loai) {
          var select = layPhanTu(cauHinh[loai].sizeId);
          var hienTai = select.value;
          select.innerHTML = '';
          themLuaChon(select, '', '');
          trangThai.sizes.forEach(function(size) {
            themLuaChon(select, size, size);
          });
          if (hienTai) select.value = hienTai;
        });
      }

      function themLuaChon(select, value, label) {
        var option = document.createElement('option');
        option.value = value;
        option.textContent = label;
        select.appendChild(option);
      }

      function luuKeHoach(loai) {
        if (trangThai.dangLuu) return;

        var form = layPhanTu(cauHinh[loai].formId);
        var payload;
        try {
          payload = taoPayload(loai, form);
        } catch (loiValidation) {
          datThongBao(loai, loiValidation.message, 'loi');
          return;
        }

        var hienCo = timKeHoach(loai, payload.thoiGian, payload.size);
        var method = hienCo ? 'updatePlan' : 'createPlan';
        if (hienCo) payload.id = hienCo.id;

        trangThai.dangLuu = true;
        datNutDangLuu(form, true);
        datThongBao(loai, 'Đang lưu...', '');

        goiServer(method, payload)
          .then(function(phanHoi) {
            if (!phanHoi || phanHoi.success !== true) {
              throw new Error('Phản hồi lưu kế hoạch không hợp lệ.');
            }
            datThongBao(loai, hienCo ? 'Đã cập nhật kế hoạch.' : 'Đã lưu kế hoạch.', 'ok');
            return taiLaiSauKhiLuu(loai);
          })
          .catch(function(loi) {
            datThongBao(loai, layThongDiepLoi(loi, 'Không thể lưu kế hoạch.'), 'loi');
          })
          .finally(function() {
            trangThai.dangLuu = false;
            datNutDangLuu(form, false);
          });
      }

      function taiLaiSauKhiLuu(loai) {
        return goiServer('getPlanModuleData', null)
          .then(function(phanHoi) {
            if (phanHoi && phanHoi.success === true && phanHoi.data) {
              trangThai.daily = Array.isArray(phanHoi.data.daily) ? phanHoi.data.daily : [];
              trangThai.monthly = Array.isArray(phanHoi.data.monthly) ? phanHoi.data.monthly : [];
              trangThai.sizes = Array.isArray(phanHoi.data.sizes) ? phanHoi.data.sizes : trangThai.sizes;
              napSize();
            }
          })
          .catch(function() {
            datThongBao(loai, 'Đã lưu kế hoạch. Tải lại dữ liệu chưa hoàn tất.', 'ok');
          });
      }
      function taoPayload(loai, form) {
        var periodName = cauHinh[loai].periodName;
        var period = layText(form.elements[periodName].value);
        var size = layText(form.elements.size.value);
        var kiemTra = laySoNguyenKhongAm(form.elements.kiemTra.value, 'KH Kiểm tra');
        var thanhPham = laySoNguyenKhongAm(form.elements.thanhPham.value, 'KH Thành phẩm');

        if (!period) throw new Error((loai === 'ngay' ? 'Ngày' : 'Tháng') + ' là bắt buộc.');
        if (!size) throw new Error('Size là bắt buộc.');

        var payload = {
          loai: loai,
          thoiGian: period,
          size: size,
          kiemTra: kiemTra,
          thanhPham: thanhPham
        };
        payload[periodName] = period;
        return payload;
      }

      function laySoNguyenKhongAm(value, tenTruong) {
        var text = layText(value);
        if (!text) throw new Error(tenTruong + ' là bắt buộc.');
        var so = Number(text);
        if (!Number.isFinite(so) || so < 0 || Math.floor(so) !== so) {
          throw new Error(tenTruong + ' phải là số nguyên >= 0.');
        }
        return so;
      }

      function timKeHoach(loai, thoiGian, size) {
        var danhSach = trangThai[cauHinh[loai].collection] || [];
        var key = taoKey(thoiGian, size);
        for (var index = 0; index < danhSach.length; index++) {
          if (taoKey(danhSach[index].thoiGian, danhSach[index].size) === key) return danhSach[index];
        }
        return null;
      }

      function taoKey(thoiGian, size) {
        return layText(thoiGian) + '\u0001' + layText(size).toLocaleLowerCase('vi');
      }

      function datNutDangLuu(form, disabled) {
        var button = form.querySelector('button[type="submit"]');
        if (button) button.disabled = disabled;
      }

      function datThongBao(loai, message, kieu) {
        var node = layPhanTu(cauHinh[loai].statusId);
        node.textContent = message || '';
        node.className = 'trang-thai' + (kieu ? ' ' + kieu : '');
      }

      function goiServer(method, payload) {
        return new Promise(function(resolve, reject) {
          if (typeof google === 'undefined' || !google.script || !google.script.run) {
            reject(new Error('Chưa kết nối Google Apps Script.'));
            return;
          }

          var runner = google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject);

          if (payload === null || payload === undefined) runner[method]();
          else runner[method](payload);
        });
      }

      function layThongDiepLoi(loi, macDinh) {
        return loi && loi.message ? loi.message : macDinh;
      }

      function layText(value) {
        return value === null || value === undefined ? '' : String(value).trim();
      }

      document.addEventListener('DOMContentLoaded', khoiDong);
    })();
  </script>
</body>
</html>
